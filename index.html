function computeScore(c){
  let s = (c.sleep + (10-c.fatigue) + (10-c.stress) + c.motivation)/4;
  if(c.pain) s -= 2.2;
  s = Math.max(1, Math.min(10, s));
  let level = s>=7 ? 'vert' : (s>=5 ? 'orange' : 'rouge');
  if(c.pain && level==='vert') level='orange';
  return { score: Math.round(s*10)/10, level };
}
function adaptation(c, level){
  if(c.pain) return {t:'Séance adaptée — variantes', cls:'o', x:"Douleur signalée : les exercices à risque seraient remplacés par des variantes sans impact."};
  if(c.fatigue>=7 || level==='rouge') return {t:'Séance allégée', cls:'r', x:"Fatigue élevée : volume réduit d'environ 30 % et intensité abaissée."};
  if(c.sleep<=4) return {t:'Séance transformée', cls:'o', x:"Récupération insuffisante : séance orientée récupération active et mobilité."};
  if(level==='vert') return {t:'Charge maintenue · progression', cls:'g', x:"Tous les voyants au vert : charge maintenue, légère progression possible."};
  return {t:'Charge maintenue', cls:'o', x:"État correct : séance conservée."};
}

async function saveCheckin(c){
  const uid = S.user.id; const d = today();
  const { score, level } = computeScore(c);
  const ce = await db.from('daily_checkins').upsert({ athlete_id:uid, date:d, weight:c.weight, sleep:c.sleep, fatigue:c.fatigue, stress:c.stress, motivation:c.motivation, pain:c.pain }, { onConflict:'athlete_id,date' });
  if(ce.error) throw ce.error;
  const a = adaptation(c, level);
  const se = await db.from('fitness_scores').upsert({ athlete_id:uid, date:d, score:score, level:level, risk_factors:a.t }, { onConflict:'athlete_id,date' });
  if(se.error) throw se.error;
  await loadAll();
  return { score, level, a };
}

  var last=pts[pts.length-1].split(',');

}

}
function runManualSection(){
  var runs=S.runs||[];
  var total=Math.round(runs.reduce(function(a,r){return a+(Number(r.distance_km)||0);},0)*10)/10;
  var stat='<div class="row" style="gap:8px;margin-bottom:12px"><div class="card flat" style="flex:1;margin:0;text-align:center;padding:11px"><div class="label">Sorties</div><div class="big" style="font-size:20px;margin-top:3px">'+runs.length+'</div></div><div class="card flat" style="flex:1;margin:0;text-align:center;padding:11px"><div class="label">Total</div><div class="big" style="font-size:20px;margin-top:3px">'+total+' km</div></div></div>';
  var form='<div class="card"><div class="flabel">Noter une sortie libre</div><div class="row" style="gap:8px;margin-top:7px"><input id="run-km" class="in" type="number" step="0.1" placeholder="Distance (km)" style="margin-top:0"><input id="run-min" class="in" type="number" step="1" placeholder="Durée (min)" style="margin-top:0"></div><input id="run-note" class="in" type="text" placeholder="Ressenti / notes (optionnel)"><button class="btn" onclick="doSaveRun()" style="margin-top:10px">Enregistrer la sortie</button></div>';
  var list=runs.length?('<div class="card" style="padding:6px 14px">'+runs.map(function(r){var km=Number(r.distance_km)||0;var mn=Number(r.duration_min)||0;var pace=(km>0&&mn>0)?(mn/km):0;var ps=pace?(Math.floor(pace)+':'+('0'+Math.round((pace%1)*60)).slice(-2)+' /km'):'';var d=new Date((r.date||'')+'T00:00:00');var ds=isNaN(d)?(r.date||''):d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});return '<div class="ex"><div class="n"><i class="ti ti-run"></i></div><div class="m"><div class="nm">'+km+' km'+(mn?' · '+mn+' min':'')+'</div><div class="ds">'+ds+(ps?' · '+ps:'')+(r.notes?' · '+esc(r.notes):'')+'</div></div></div>';}).join('')+'</div>'):'';
  return '<div class="label" style="margin:6px 2px 8px">Journal de mes sorties</div>'+stat+form+list;
}
async function doSaveRun(){
  var km=parseFloat(document.getElementById('run-km').value)||null;
  var mn=parseFloat(document.getElementById('run-min').value)||null;
  var note=(document.getElementById('run-note').value||'').trim()||null;
  if(!km){ S.msg={k:'err',t:'Indique au moins la distance.'}; render(); return; }
  try{ await db.from('runs').insert({athlete_id:S.user.id, date:today(), distance_km:km, duration_min:mn, notes:note}); await loadAll(); S.msg={k:'ok',t:'Sortie enregistrée !'}; }
  catch(e){ S.msg={k:'err',t:'Erreur : '+(e.message||e)}; }

}
function computeBadges(){
  var done=(S.history||[]).filter(function(w){return w.status==='realisee';}).length;
  var ci=S.checkinCount||0;
  var runs=(S.runs||[]).length;
  var totalKm=(S.runs||[]).reduce(function(a,r){return a+(Number(r.distance_km)||0);},0);
  var w=S.weights||[]; var delta=w.length>=2?(Number(w[w.length-1].weight)-Number(w[0].weight)):0;
  var muscuDone=S.muscu?(S.muscu.days||[]).filter(function(d){return d.done;}).length:0;
  var runDone=S.runPlan?S.runPlan.weeks.reduce(function(a,wk){return a+wk.sessions.filter(function(s){return s.done;}).length;},0):0;
  return [
    {n:'Premier pas', d:'1er check-in', ok:ci>=1},
    {n:'Régulier', d:'7 check-ins', ok:ci>=7},
    {n:'Assidu', d:'30 check-ins', ok:ci>=30},
    {n:'Machine à check-in', d:'60 check-ins', ok:ci>=60},
    {n:'Première séance', d:'1 séance terminée', ok:done>=1},
    {n:'Machine', d:'10 séances', ok:done>=10},
    {n:'Perfectionniste', d:'50 séances', ok:done>=50},
    {n:'Coureur', d:'1re sortie', ok:runs>=1},
    {n:'Fondeur', d:'42 km cumulés', ok:totalKm>=42},
    {n:'Marathonien', d:'100 km cumulés', ok:totalKm>=100},
    {n:'Programmé', d:'Programme muscu lancé', ok:!!S.muscu},
    {n:'Discipline', d:'20 séances muscu du programme', ok:muscuDone>=20},
    {n:'Plan tracé', d:'Plan course créé', ok:!!S.runPlan},
    {n:'Sur les rails', d:'10 séances du plan course', ok:runDone>=10},
    {n:'Transformation', d:'-2 kg', ok:delta<=-2}
  ];
}
function computePoints(){
  var done=(S.history||[]).filter(function(w){return w.status==='realisee';}).length;
  var ci=S.checkinCount||0;
  var runs=(S.runs||[]).length;
  var km=Math.round((S.runs||[]).reduce(function(a,r){return a+(Number(r.distance_km)||0);},0));
  var badges=computeBadges().filter(function(b){return b.ok;}).length;
  var muscuDone=S.muscu?(S.muscu.days||[]).filter(function(d){return d.done;}).length:0;
  var runDone=S.runPlan?S.runPlan.weeks.reduce(function(a,wk){return a+wk.sessions.filter(function(s){return s.done;}).length;},0):0;
  return ci*2 + done*10 + runs*8 + km + badges*15 + muscuDone*10 + runDone*8;
}

function daysTo(dstr){ if(!dstr) return null; var d=new Date(dstr+'T00:00:00'); if(isNaN(d)) return null; var t=new Date(); t=new Date(t.getFullYear(),t.getMonth(),t.getDate()); return Math.round((d-t)/86400000); }
function phaseLabel(days){ if(days==null) return ''; if(days<=2) return 'Compétition'; if(days<=7) return 'Affûtage'; if(days<=14) return 'Pic de forme'; if(days<=28) return 'Spécialisation'; if(days<=56) return 'Développement'; return 'Préparation générale'; }
function nextComp(){ var cs=(S.comps||[]).filter(function(c){var d=daysTo(c.date);return d!=null&&d>=0;}).sort(function(a,b){return daysTo(a.date)-daysTo(b.date);}); return cs[0]||null; }

  else { document.documentElement.setAttribute('data-theme','dark'); try{localStorage.setItem('coachia-theme','dark');}catch(e){} }

async function doExport(){
  try{
    var uid=S.user.id;
    var tabs=['profiles','daily_checkins','fitness_scores','workouts','workout_exercises','nutrition_plans','meals','runs','competitions'];
    var out={};
    for(var i=0;i<tabs.length;i++){ var t=tabs[i]; try{ var q=db.from(t).select('*'); if(t==='profiles') q=q.eq('id',uid); else if(t!=='workout_exercises'&&t!=='meals') q=q.eq('athlete_id',uid); var r=await q; out[t]=r.data||[]; }catch(e){ out[t]='err'; } }

    var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='coachia-mes-donnees.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    S.msg={k:'ok',t:'Export téléchargé.'};
  }catch(e){ S.msg={k:'err',t:'Erreur export : '+(e.message||e)}; }

}

function runTypeLabel(t){ return ({EF:'Endurance fondamentale',FRAC:'Fractionné',LONG:'Sortie longue',RECUP:'Récupération',MC:'Marche / course'})[t]||'Sortie'; }

function runTypeCol(t){ return t==='FRAC'?'var(--amber)':(t==='LONG'?'var(--green)':(t==='RECUP'?'var(--green)':'var(--accent)')); }
function runSessionBase(t){
  var b={
    EF:{wu:'5 min de marche rapide, puis 5 min de footing très lent. Termine par 3 montées de genoux et 3 talons-fesses.',cd:'5 min de marche + étirements doux (mollets, cuisses, ischios).',tip:'Allure « test de la parole » : tu dois pouvoir tenir une conversation en courant. Si tu es essoufflé, ralentis ou marche un peu, c’est normal.'},
    FRAC:{wu:'10 min de footing lent, puis 3 accélérations progressives de 20 s (récupération en marchant entre chaque).',cd:'8 à 10 min de footing très lent, puis étirements.',tip:'Les portions rapides = vite mais maîtrisé (≈ 8/10 d’effort), surtout pas un sprint. Récupère vraiment entre chaque (marche ou footing très lent).'},
    LONG:{wu:'5 min de marche rapide, puis pars TRÈS lentement.',cd:'5 min de marche + étirements, et bois bien.',tip:'C’est la sortie la plus longue de la semaine : reste très lent du début à la fin. Le but, c’est la durée — pas la vitesse.'},
    RECUP:{wu:'Pars directement, très lentement.',cd:'Étirements légers.',tip:'Footing de récupération : ultra léger, juste pour faire tourner les jambes sans fatigue.'},
    MC:{wu:'5 min de marche rapide pour t’échauffer, avec quelques cercles de bras et montées de genoux.',cd:'5 min de marche lente + étirements mollets et cuisses.',tip:'Cours LENTEMENT pendant les phases de course (tu dois pouvoir parler). Marche franchement pour récupérer. Objectif : finir sans être épuisé, pas aller vite.'}
  };

}
function runGoals(){ return [

  {k:'vite',label:'Courir plus vite',weeks:6},
  {k:'reprise',label:'Reprise en douceur',weeks:6}
];}
function runGoalLabel(k){ var g=runGoals().filter(function(x){return x.k===k;})[0]; return g?g.label:'Plan course'; }
function runWeekPlan(k){
  if(k==='debut5k') return [

function muscuLastLoad(name){

function buildMuscuProgram(split,perWeek,weeks,equip,start){
  start=nextMonday(start);
  var tier=muscuEquipTier(equip);
  var pattern=muscuSplitDays(split);
  var offs=muscuOffsets(perWeek);
  var days=[]; var counter=0;
  for(var w=1;w<=weeks;w++){
    for(var s=0;s<perWeek;s++){
      var grp=pattern[counter % pattern.length]; counter++;
      var lib=muscuExo(grp,tier);
      var deload=(w===weeks && weeks>=4);
      var exs=lib.map(function(e){
        var base=muscuLastLoad(e[0]);
        var load=base?((deload?Math.round(base*0.9):base)+' kg'):'';
        var sets=deload?Math.max(2,e[1]-1):e[1];
        return {name:e[0], sets:sets, reps:e[2], load:load, rest:'2 min', done:false};
      });
      days.push({ id:'w'+w+'d'+(s+1), week:w, grp:grp, label:muscuDayLabel(grp), date:addDays(start,(w-1)*7+offs[s%offs.length]), deload:deload, done:false, exercises:exs });
    }
  }
  return {split:split, perWeek:perWeek, weeks:weeks, equip:equip, start:start, days:days};
}

function weekSlots(n){ return [[0],[0,3],[0,2,4],[0,2,4,6],[0,1,3,4,6],[0,1,2,4,5,6]][Math.min(Math.max(n,1),6)-1]; }
function objectiveSplit(goal,N){
  var g=(goal||'').toLowerCase();
  var isCourse=['run','cours','10 km','10km','marathon','semi','trail','5 km','vite','hyrox'].some(function(w){return g.indexOf(w)>=0;});
  var isMuscu=['muscu','force','hypertroph','masse','explos'].some(function(w){return g.indexOf(w)>=0;});
  var course;
  if(isCourse&&!isMuscu) course=Math.max(1,Math.round(N*0.6));
  else if(isMuscu&&!isCourse) course=Math.max(0,Math.floor(N*0.25));
  else course=Math.round(N*0.5);
  course=Math.min(Math.max(course,0),N);
  return {course:course, muscu:N-course};
}

  var isCourse=['run','cours','10 km','10km','marathon','semi','trail','5 km','vite','hyrox'].some(function(w){return g.indexOf(w)>=0;});
  var isMuscu=['muscu','force','hypertroph','masse','explos'].some(function(w){return g.indexOf(w)>=0;});
  if(isCourse&&!isMuscu) return 0.6;
  if(isMuscu&&!isCourse) return 0.25;
  return 0.5;
}
function objectiveSplitBlend(primary,secondary,N){
  var fp=goalCourseFrac(primary);
  var frac=secondary?(2*fp+goalCourseFrac(secondary))/3:fp;
  var course=Math.min(Math.max(Math.round(frac*N),0),N);
  return {course:course, muscu:N-course};
}
function unifiedCourseTypes(c){ return [[],['EF'],['EF','FRAC'],['EF','FRAC','LONG'],['EF','FRAC','EF','LONG'],['EF','FRAC','EF','LONG','EF']][Math.min(Math.max(c,0),5)]; }
function unifiedCourseMain(t,w){
  if(t==='EF') return (25+Math.min(w*2,20))+' min de footing lent (endurance fondamentale : tu dois pouvoir parler).';
  if(t==='FRAC') return '10 min footing, puis '+(6+Math.min(w,6))+' × (1 min vite / 1 min 30 lent), puis 8 min footing.';
  if(t==='LONG') return (40+Math.min(w*3,30))+' min en allure tranquille (sortie longue).';
  return '30 min de footing.';
}
function buildUnifiedProgram(goal,offsets,weeks,equip,start,secondary){
  start=nextMonday(start);
  var N=offsets.length;
  var split=objectiveSplitBlend(goal,secondary,N);
  var slots=offsets.slice().sort(function(a,b){return a-b;});
  var types=[]; var m=split.muscu, c=split.course;
  for(var i=0;i<N;i++){ if(i%2===0){ if(c>0){types.push('course');c--;} else {types.push('muscu');m--;} } else { if(m>0){types.push('muscu');m--;} else {types.push('course');c--;} } }
  var muscuOffs=[], courseOffs=[];
  for(var k=0;k<N;k++){ if(types[k]==='muscu') muscuOffs.push(slots[k]); else courseOffs.push(slots[k]); }
  var tier=muscuEquipTier(equip);
  var mSplit=split.muscu<=1?'fullbody':(split.muscu===2?'upperlower':'ppl');
  var pattern=muscuSplitDays(mSplit);
  var cTypes=unifiedCourseTypes(split.course);
  var mdays=[]; var counter=0; var runWeeks=[];
  for(var w=1;w<=weeks;w++){
    for(var s=0;s<muscuOffs.length;s++){
      var grp=pattern[counter % pattern.length]; counter++;
      var lib=muscuExo(grp,tier);
      var deload=(w===weeks && weeks>=4);
      var exs=lib.map(function(e){ var base=muscuLastLoad(e[0]); var load=base?((deload?Math.round(base*0.9):base)+' kg'):''; var sets=deload?Math.max(2,e[1]-1):e[1]; return {name:e[0],sets:sets,reps:e[2],load:load,rest:'2 min',done:false}; });
      mdays.push({id:'w'+w+'m'+(s+1), week:w, grp:grp, label:muscuDayLabel(grp), date:addDays(start,(w-1)*7+muscuOffs[s]), deload:deload, done:false, exercises:exs});
    }
    var sess=[];
    for(var q=0;q<courseOffs.length;q++){ var ct=cTypes[q%cTypes.length]||'EF'; sess.push({id:'w'+w+'c'+(q+1), t:ct, m:unifiedCourseMain(ct,w), date:addDays(start,(w-1)*7+courseOffs[q]), done:false}); }
    runWeeks.push({n:w, f:'Semaine '+w, sessions:sess});
  }
  var muscu = split.muscu>0 ? {split:mSplit, perWeek:split.muscu, weeks:weeks, equip:equip, start:start, days:mdays, unified:true} : null;
  var run = split.course>0 ? {goal:'unifie', perWeek:split.course, start:start, weeks:runWeeks, unified:true} : null;
  return {muscu:muscu, run:run, split:split};
}

    '<div class="card"><div class="flabel">Durée du programme</div><select class="in" id="up-weeks"><option value="4">4 semaines</option><option value="6" selected>6 semaines</option><option value="8">8 semaines</option></select></div>'+
    selField('up-equip','Matériel disponible',p.available_equipment,eq)+
    '<div class="card"><div class="flabel">Date de début (démarre le lundi suivant)</div><input id="up-start" class="in" type="date" value="'+today()+'"></div>'+
    '<button class="btn" onclick="doCreateUnified()"><i class="ti ti-sparkles"></i> Créer mon programme complet</button>';
}
async function doCreateUnified(){
  var goalEl=document.getElementById('up-goal'); var goal=(goalEl&&goalEl.value)||(S.profile&&S.profile.main_goal)||'Forme';
  var g2El=document.getElementById('up-goal2'); var secondary=(g2El&&g2El.value)||'';
  var dayEls=document.querySelectorAll('.up-day'); var offs=[]; for(var i=0;i<dayEls.length;i++){ if(dayEls[i].checked) offs.push(parseInt(dayEls[i].value)); }
  if(!offs.length){ S.msg={k:'err',t:'Choisis au moins un jour d\'entraînement.'}; render(); return; }
  var weeks=parseInt(document.getElementById('up-weeks').value)||6;
  var eqEl=document.getElementById('up-equip'); var equip=(eqEl&&eqEl.value)||(S.profile&&S.profile.available_equipment)||'Salle de sport (basique)';
  var start=document.getElementById('up-start').value||today();
  var prog=buildUnifiedProgram(goal,offs,weeks,equip,start,secondary);
  try{
    var upd={ muscu_program:prog.muscu, run_plan:prog.run };
    if(goalEl&&goalEl.value){ upd.main_goal=goalEl.value; }
    var r=await db.from('profiles').update(upd).eq('id',S.user.id);
    if(r.error) throw r.error;
    S.muscu=prog.muscu; S.runPlan=prog.run; if(S.profile){ S.profile.muscu_program=prog.muscu; S.profile.run_plan=prog.run; if(upd.main_goal)S.profile.main_goal=upd.main_goal; }
    S.msg={k:'ok',t:'Programme complet créé ✅ '+prog.split.muscu+' muscu + '+prog.split.course+' course / semaine. Vois-le dans l\'Agenda.'};
  }catch(e){ S.msg={k:'err',t:'Erreur : '+(e.message||e)}; }
  S.screen='dash'; render();
}
/* ===== TESTS (P'F"T Hyrox, VMA, force, physique) ===== */
function pftDivision(m){ if(m<=25) return 'Hyrox PRO'; if(m<=35) return 'Hyrox Open'; if(m<=40) return 'Hyrox Doubles'; if(m<=45) return 'Hyrox Relais'; return 'Continue à progresser (vise Relais/Open)'; }
function fmtPace(mpk){ if(!isFinite(mpk)||mpk<=0) return '—'; var m=Math.floor(mpk); var s=Math.round((mpk-m)*60); if(s===60){m++;s=0;} return m+':'+('0'+s).slice(-2)+' /km'; }
function lastTest(type){ var a=S.tests||[]; for(var i=0;i<a.length;i++){ if(a[i].type===type) return a[i]; } return null; }
async function saveTest(type,value,note){
  if(value==null||isNaN(value)){ S.msg={k:'err',t:'Entre une valeur valide.'}; render(); return; }
  try{ await db.from('fitness_tests').insert({athlete_id:S.user.id,type:type,value:value,note:note||null,date:today()}); var tr=await db.from('fitness_tests').select('*').eq('athlete_id',S.user.id).order('date',{ascending:false}).limit(100); S.tests=tr.data||[]; S.msg={k:'ok',t:'Test enregistré !'}; }
  catch(e){ S.msg={k:'err',t:'Erreur : '+(e.message||e)+' (la table fitness_tests est-elle créée ?)'}; }
  render();
}
function doSavePFT(){ var el=document.getElementById('t-pft'); var v=parseFloat(el?el.value:''); saveTest('pft', v, isNaN(v)?null:pftDivision(v)); }
function doSaveVMA(){ var el=document.getElementById('t-vma'); var dist=parseFloat(el?el.value:''); if(isNaN(dist)||dist<=0){ S.msg={k:'err',t:'Entre la distance parcourue.'}; render(); return; } var vma=Math.round(dist/100*10)/10; saveTest('vma', vma, dist+' m en 6 min'); }
function doSaveForce(){ var el=document.getElementById('t-force'); var kg=parseFloat(el?el.value:''); var exoEl=document.getElementById('t-force-exo'); var exo=(exoEl?exoEl.value:'').trim(); saveTest('force', kg, exo||null); }
function doSaveSimple(type,id){ var el=document.getElementById(id); var v=parseFloat(el?el.value:''); saveTest(type, v); }
function scrTests(){
  var tb='<div class="tbar"><button class="ic" onclick="go(\'dash\')"><i class="ti ti-chevron-left"></i></button><h2 style="font-size:19px">Mes tests</h2><span style="width:38px"></span></div>';
  var msg=S.msg?'<div class="msg '+S.msg.k+'">'+S.msg.t+'</div>':'';
  var pft=lastTest('pft'), vma=lastTest('vma'), force=lastTest('force');
  var pp=lastTest('pompes'), tra=lastTest('tractions'), ga=lastTest('gainage');
  var stations='<div class="sub" style="line-height:1.7;margin-bottom:4px">1000 m course · 50 burpee broad jumps · 100 fentes · 1000 m rameur · 30 pompes · 100 wall balls (6/4 kg) — enchaînés, au chrono.</div>';
  var pftLast=pft?'<div class="banner" style="background:var(--accent-soft)"><i class="ti ti-clock" style="color:var(--accent)"></i><div class="x" style="color:#1742a5">Dernier : <b>'+pft.value+' min</b> → division conseillée : <b>'+esc(pft.note||pftDivision(pft.value))+'</b></div></div>':'';
  var pftCard='<div class="card"><div class="label" style="margin-bottom:6px">Hyrox P\'F"T (benchmark)</div>'+stations+pftLast+'<div class="row" style="gap:8px;margin-top:9px"><input id="t-pft" class="in" type="number" step="0.1" placeholder="Ton temps total (min)" style="margin-top:0"><button class="btn" style="width:auto;margin-top:0;padding:13px 16px" onclick="doSavePFT()">OK</button></div><div class="sub" style="font-size:11px;margin-top:8px">Repères : ≤25 min PRO · 25-35 Open · 30-40 Doubles · 35-45 Relais.</div></div>';
  var vmaLast=vma?'<div class="sub" style="margin:6px 0;color:var(--ink)">VMA : <b>'+vma.value+' km/h</b> → Endurance '+fmtPace(60/(vma.value*0.70))+' · Seuil '+fmtPace(60/(vma.value*0.85))+' · Fractionné '+fmtPace(60/vma.value)+'</div>':'';
  var vmaCard='<div class="card"><div class="label" style="margin-bottom:6px">VMA (test 6 min)</div><div class="sub">Bien échauffé, cours le plus loin possible en 6 min, puis note la distance.</div>'+vmaLast+'<div class="row" style="gap:8px;margin-top:9px"><input id="t-vma" class="in" type="number" placeholder="Distance en 6 min (m)" style="margin-top:0"><button class="btn" style="width:auto;margin-top:0;padding:13px 16px" onclick="doSaveVMA()">OK</button></div></div>';
  var forceCard='<div class="card"><div class="label" style="margin-bottom:6px">Force (charge max / 1RM)</div>'+(force?'<div class="sub" style="margin-bottom:6px;color:var(--ink)">Dernier : <b>'+force.value+' kg</b>'+(force.note?' ('+esc(force.note)+')':'')+'</div>':'')+'<input id="t-force-exo" class="in" type="text" placeholder="Exercice (ex : Squat, Développé couché)"><div class="row" style="gap:8px;margin-top:7px"><input id="t-force" class="in" type="number" placeholder="Charge max (kg)" style="margin-top:0"><button class="btn" style="width:auto;margin-top:0;padding:13px 16px" onclick="doSaveForce()">OK</button></div></div>';
  function simpleRow(lab,type,id,unit,last){ return '<div class="row" style="gap:8px;margin-bottom:9px"><div style="flex:1"><div style="font-weight:700;font-size:13px">'+lab+'</div>'+(last?'<div class="sub" style="font-size:11px">Dernier : '+last.value+' '+unit+'</div>':'')+'</div><input id="'+id+'" class="in" type="number" placeholder="'+unit+'" style="margin-top:0;width:82px"><button class="btn" style="width:auto;margin-top:0;padding:12px 14px" onclick="doSaveSimple(\''+type+'\',\''+id+'\')">OK</button></div>'; }
  var physCard='<div class="card"><div class="label" style="margin-bottom:10px">Test physique</div>'+simpleRow('Pompes (max)','pompes','t-pompes','reps',pp)+simpleRow('Tractions (max)','tractions','t-tractions','reps',tra)+simpleRow('Gainage (planche)','gainage','t-gainage','s',ga)+'</div>';
  return tb+msg+'<div class="banner" style="background:var(--accent-soft)"><i class="ti ti-clipboard-check" style="color:var(--accent)"></i><div class="x" style="color:#1742a5">Fais ces tests, note tes résultats, et refais-les toutes les 4-6 semaines pour mesurer tes progrès et affiner tes allures / charges.</div></div>'+pftCard+vmaCard+forceCard+physCard;
}
function navBar(){
  const b=(ic,t)=>'<button class="'+(S.screen===t?'on':'')+'" onclick="go(\''+t+'\')" style="font-size:11px;font-weight:700;color:inherit;letter-spacing:.02em">'+ic+'</button>';
  return b('Accueil','dash')+b('Séance','workout')+b('Nutrition','nutrition')+b('Check-in','checkin')+b('Agenda','calendar');
}
function render(extra){
  const sc=document.getElementById('screen'), nav=document.getElementById('nav');
  let html='';
  if(S.screen==='login'){ html=scrLogin(); nav.style.display='none'; }
  else if(S.screen==='result'){ html=scrResult(extra); nav.style.display='flex'; nav.innerHTML=navBar(); }
  else { nav.style.display='flex'; nav.innerHTML=navBar();
    html = S.screen==='checkin'?scrCheckin():(S.screen==='workout'?scrWorkout():(S.screen==='profile'?scrProfile():(S.screen==='genopts'?scrGenOptions():(S.screen==='charges'?scrCharges():(S.screen==='calendar'?scrCalendar():(S.screen==='coach'?scrCoach():(S.screen==='coachDetail'?scrCoachDetail():(S.screen==='nutrition'?scrNutrition():(S.screen==='runs'?scrRuns():(S.screen==='badges'?scrBadges():(S.screen==='feedback'?scrFeedback():(S.screen==='comps'?scrComps():(S.screen==='assistant'?scrAssistant():(S.screen==='report'?scrReport():(S.screen==='runplanopts'?scrRunPlanOpts():(S.screen==='runsession'?scrRunSession():(S.screen==='newathlete'?scrNewAthlete():(S.screen==='athleteEdit'?scrAthleteEdit():(S.screen==='muscu'?scrMuscu():(S.screen==='muscuopts'?scrMuscuOpts():(S.screen==='muscuday'?scrMuscuDay():(S.screen==='exodetail'?scrExoDetail():(S.screen==='leaderboard'?scrLeaderboard():(S.screen==='groupsession'?scrGroupSession():(S.screen==='programopts'?scrProgramOpts():(S.screen==='tests'?scrTests():scrDash()))))))))))))))))))))))))));
  }
  sc.innerHTML=html; sc.scrollTop=0; S.msg=null;
  const e=document.getElementById('i-email'); if(e) e.addEventListener('keydown',ev=>{if(ev.key==='Enter')document.getElementById('i-pass').focus();});
  const p=document.getElementById('i-pass'); if(p) p.addEventListener('keydown',ev=>{if(ev.key==='Enter')doLogin();});
  painState = !!(S.todayCheckin && S.todayCheckin.pain);
}
function go(s){ S.screen=s; render(); }

async function doLogin(){
  const raw=document.getElementById('i-email').value.trim(); const pass=document.getElementById('i-pass').value;
  if(!raw||!pass){ S.msg={k:'err',t:'Saisis ton pseudo et ton mot de passe.'}; render(); return; }
  const email=loginToEmail(raw);
  const btn=document.getElementById('b-login'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const { data, error } = await db.auth.signInWithPassword({ email, password:pass });
  if(error){ S.msg={k:'err',t:'Connexion impossible : '+error.message}; render(); return; }
  S.user = data.user; await loadAll(); S.screen='dash'; render();
}
async function doLogout(){ await db.auth.signOut(); S.user=null; S.profile=null; S.workout=null; S.screen='login'; render(); }
function setPain(v){ painState=v; document.getElementById('py').classList.toggle('on',v); document.getElementById('pn').classList.toggle('on',!v); }
async function doSaveCheckin(){
  const c = { weight: parseFloat(document.getElementById('c-weight').value)||null, sleep: parseInt(document.getElementById('c-sleep').value), fatigue: parseInt(document.getElementById('c-fatigue').value), stress: parseInt(document.getElementById('c-stress').value), motivation: parseInt(document.getElementById('c-motivation').value), pain: painState };
  const btn=document.getElementById('b-save'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';

  catch(e){ S.msg={k:'err',t:'Erreur d\'enregistrement : '+(e.message||e)}; render(); }
}
async function doSaveProfile(){

  const upd = { first_name:g('pf-first')||null, main_goal:g('pf-goal')||null, sport_level:g('pf-level')||null, sex:g('pf-sex')||null, morphology:g('pf-morph')||null, available_equipment:g('pf-equip')||null, session_duration_min:parseInt(g('pf-dur'))||null, target_weight:parseFloat(g('pf-target'))||null, injuries_current:g('pf-injuries')||null };
  const btn=document.getElementById('b-profile'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';

  await loadAll(); S.msg={k:'ok',t:'Profil enregistré. Tes prochaines séances en tiendront compte.'}; render();
}
async function startWorkout(){ S.started=true; render(); }
async function finishWorkout(){ try{ await db.from('workouts').update({status:'realisee'}).eq('id',S.workout.id); S.workout.status='realisee'; }catch(_){} render(); }
async function doGenerate(){
  try{ var eqEl=document.getElementById('ge-equip'),duEl=document.getElementById('ge-dur'); var upd={}; if(eqEl&&eqEl.value)upd.available_equipment=eqEl.value; if(duEl&&duEl.value)upd.session_duration_min=parseInt(duEl.value)||null; if(Object.keys(upd).length){ await db.from('profiles').update(upd).eq('id',S.user.id); S.profile=Object.assign(S.profile||{},upd); } }catch(_){}
  S.generating=true; S.screen='workout'; render();
  try{
    const { data, error } = await db.functions.invoke(FN_GENERATE, { body:{} });
    S.generating=false;
    if(error){ let detail=''; try{ const j = await error.context.json(); detail = j.error || ''; }catch(_){} S.msg={k:'err',t:'Génération impossible. '+detail}; S.workout=null; render(); return; }
    if(data && data.error){ S.msg={k:'err',t:'Génération impossible : '+data.error}; render(); return; }
    await loadAll(); S.started=false; S.screen='workout'; render();
  }catch(e){ S.generating=false; S.msg={k:'err',t:'Erreur : '+(e.message||e)}; render(); }
}

(async function init(){
  const { data } = await db.auth.getSession();
  if(data.session){ S.user=data.session.user; await loadAll(); S.screen='dash'; }
  else { S.screen='login'; }
